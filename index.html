<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEXUS ULTRA V9.0 · Motor Algébrico</title>
  <style>
    :root {
      --void: #02040a;
      --gold: #ffd700;
      --cyan: #00f2ff;
      --emerald: #00ff88;
      --danger: #ff4d6d;
      --panel: rgba(10, 15, 28, 0.98);
      --font-size-base: 14pt;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: var(--font-size-base);
    }

    body {
      background: var(--void);
      background-image: radial-gradient(circle at center, #0a1b3a 0%, #02040a 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100dvh;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: var(--panel);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 25px;
      padding: 26px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      overflow-y: auto;
      max-height: 95dvh;
      margin-top: 10px;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 900;
      line-height: 1.1;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }
    .header p {
      font-size: 0.85rem;
      color: var(--cyan);
      text-transform: uppercase;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .clock-box, .info-box, .freq-box {
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid rgba(0,242,255,0.12);
    }
    .clock-box { text-align: center; }
    #timeLine { font-size: 1.8rem; font-weight: 900; color: var(--cyan); display: block; font-variant-numeric: tabular-nums; }
    #dateLine { font-size: 1.1rem; font-weight: 700; color: var(--cyan); display: block; margin-top: 4px; letter-spacing: 0.5px; text-transform: capitalize; }

    .info-box { color: #ccd; line-height: 1.5; font-size: 0.95rem; }
    .info-box b { color: var(--gold); }

    .freq-box {
      color: #ccd;
      line-height: 1.5;
      font-size: 0.9rem;
    }
    .freq-box b { color: var(--gold); display: block; margin-bottom: 8px; }
    .freq-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .freq-col {
      background: rgba(255,255,255,0.02);
      padding: 10px;
      border-radius: 10px;
    }
    .freq-col .title {
      font-weight: 800;
      color: var(--gold);
      text-align: center;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .num-item {
      display: inline-block;
      background: #111;
      padding: 3px 8px;
      border-radius: 20px;
      margin: 2px;
      font-size: 0.75rem;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .num-item.hot { color: var(--danger); border-color: rgba(255, 77, 109, 0.3); }
    .num-item.cold { color: var(--cyan); border-color: rgba(0, 242, 255, 0.3); }

    label {
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 800;
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      font-size: 0.9rem;
    }

    select, textarea {
      width: 100%;
      padding: 14px;
      background: #000;
      border: 1px solid #444;
      color: #fff;
      border-radius: 12px;
      font-weight: bold;
      outline: none;
      margin-bottom: 16px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    select:focus, textarea:focus { border-color: var(--cyan); }

    .exclude-box textarea {
      border-left: 4px solid var(--danger);
      height: 60px;
      resize: none;
      font-size: 0.9rem;
    }

    .config-group { margin-bottom: 16px; }

    .price-tag {
      background: linear-gradient(135deg, rgba(0,255,136,0.05), rgba(0,242,255,0.05));
      padding: 16px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 18px;
      border: 1px solid rgba(0,255,136,0.3);
    }
    .price-tag b { font-size: 2rem; color: #fff; display: block; margin-bottom: 4px; }
    .price-sub { font-size: 0.9rem; color: var(--emerald); font-weight: 800; line-height: 1.4; }

    .main-btn, .copy-btn {
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      border: none;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
      font-size: 1.05rem;
      letter-spacing: 1px;
      transition: transform 0.1s, opacity 0.2s;
    }
    .main-btn:active, .copy-btn:active { transform: scale(0.98); }
    .main-btn {
      background: linear-gradient(45deg, #d4af37, #f1c40f);
      color: #000;
      box-shadow: 0 4px 15px rgba(241, 196, 15, 0.3);
    }
    .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-area {
      display: none;
      margin-top: 25px;
      padding-top: 15px;
      border-top: 2px solid rgba(255,215,0,0.2);
    }
    .combo-block {
      background: rgba(255,255,255,0.02);
      padding: 15px;
      border-radius: 20px;
      margin-bottom: 18px;
      border: 1px solid #333;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .combo-title { text-align: center; color: var(--gold); font-weight: 900; margin-bottom: 12px; font-size: 0.95rem; letter-spacing: 1px; }

    .ball-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 12px 0; }
    .ball {
      width: 50px; height: 50px; border-radius: 50%;
      background: linear-gradient(145deg, #1a1a1a, #000);
      border: 2px solid var(--cyan);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; color: #fff; font-size: 1.15rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
    }
    .ball.star { border-color: var(--gold); color: var(--gold); background: linear-gradient(145deg, #2a2500, #000); }

    .draw-schedule {
      text-align: center;
      color: var(--emerald);
      font-weight: 700;
      font-size: 0.9rem;
      margin-top: 6px;
      padding: 6px 10px;
      background: rgba(0, 255, 136, 0.05);
      border-radius: 10px;
      border: 1px solid rgba(0, 255, 136, 0.15);
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
    }

    .analysis {
      color: #aaa; text-align: center; line-height: 1.6; padding: 10px;
      font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 10px;
    }
    .analysis b { color: var(--emerald); }

    .real-odds {
      background: rgba(255, 77, 109, 0.1);
      border: 1px solid rgba(255, 77, 109, 0.3);
      color: #ff8fa3;
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    .copy-btn { border: 2px solid var(--cyan); background: transparent; color: var(--cyan); margin-top: 20px;}
    .copy-btn.copied { background: var(--emerald); border-color: var(--emerald); color: #000; }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #445;
      margin-top: 26px;
      line-height: 1.4;
    }

    .hotcold-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .hotcold-toggle input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--cyan);
    }
    .hotcold-toggle label {
      margin: 0;
      font-size: 0.9rem;
      color: var(--cyan);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>NEXUS ULTRA</h1>
    <p>Motor Algébrico · V9.0</p>
  </div>

  <div class="clock-box">
    <span id="timeLine">00:00:00</span>
    <span id="dateLine">...</span>
  </div>

  <div class="info-box" id="gameInfo">Escolha o jogo para ver regras e odds reais.</div>

  <!-- Simulação de Monte Carlo (quentes/frios) -->
  <div class="freq-box" id="freqBox">
    <b>📊 Simulação de Monte Carlo (10.000 iterações)</b>
    <div id="freqContent">A inicializar modelo estatístico...</div>
  </div>

  <div class="config-group">
    <label>Jogo</label>
    <select id="gameSelect" onchange="initUI()">
      <option value="euromilhoes">EUROMILHÕES</option>
      <option value="totoloto">TOTOLOTO</option>
      <option value="eurodreams">EURODREAMS</option>
    </select>

    <label>Números</label>
    <select id="numQty" onchange="updateCalc()"></select>

    <label id="labelS">Estrelas</label>
    <select id="starQty" onchange="updateCalc()"></select>

    <label>Nº de conjuntos</label>
    <select id="howMany" onchange="updateCalc()">
      <option value="1">1 Conjunto</option>
      <option value="2">2 Conjuntos</option>
      <option value="3">3 Conjuntos</option>
      <option value="5">5 Conjuntos</option>
      <option value="10">10 Conjuntos</option>
    </select>
  </div>

  <div class="config-group exclude-box">
    <label>Números a excluir (opcional)</label>
    <textarea id="excludeInput" placeholder="Ex: 5, 18, 31" oninput="updateCalc()"></textarea>
  </div>

  <div class="hotcold-toggle">
    <input type="checkbox" id="useHotCold" checked>
    <label for="useHotCold">Usar tendências quentes/frios</label>
  </div>

  <div class="price-tag">
    <b id="totalPrice">€ 0,00</b>
    <div class="price-sub" id="comboInfo">SISTEMA PRONTO</div>
  </div>

  <button class="main-btn" id="generateBtn" onclick="generateNumbers()">⚡ GERAR APOSTAS</button>

  <div class="result-area" id="resultArea">
    <div id="resultsList"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyCombination()">📋 COPIAR RESULTADOS</button>
    <footer>
      SISTEMA NEXUS v9.0 · Motor de otimização estatística.<br>
      Jogue com responsabilidade.
    </footer>
  </div>
</div>

<script>
  // ------------------------------------------------------------
  // CONFIGURAÇÕES GLOBAIS
  // ------------------------------------------------------------
  const RULES = {
    euromilhoes: {
      base: 2.50, reqN: 5, reqS: 2, maxN: 50, maxS: 12, limitN: 12, limitS: 12,
      trueOdds: 139838160,
      name: "Euromilhões",
      decadeGroups: [[1,10], [11,20], [21,30], [31,40], [41,50]],
      drawInfo: "Sorteio: Terça e Sexta, às 21h00"
    },
    totoloto: {
      base: 1.00, reqN: 5, reqS: 1, maxN: 49, maxS: 13, limitN: 12, limitS: 1,
      trueOdds: 24789492,
      name: "Totoloto",
      decadeGroups: [[1,10], [11,20], [21,30], [31,40], [41,49]],
      drawInfo: "Sorteio: Quarta e Sábado, às 21h00"
    },
    eurodreams: {
      base: 2.00, reqN: 6, reqS: 1, maxN: 40, maxS: 5, limitN: 12, limitS: 5,
      trueOdds: 19191900,
      name: "EuroDreams",
      decadeGroups: [[1,10], [11,20], [21,30], [31,40]],
      drawInfo: "Sorteio: Segunda e Quinta, às 21h00"
    }
  };

  let generatedGames = [];
  let hotNumbers = [];
  let coldNumbers = [];

  // ------------------------------------------------------------
  // MATEMÁTICA
  // ------------------------------------------------------------
  function combinations(n, k) {
    if (k > n) return 0;
    if (k === 0 || k === n) return 1;
    let res = 1;
    for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i;
    return Math.round(res);
  }

  function isPrime(num) {
    if (num <= 1) return false;
    if (num <= 3) return true;
    if (num % 2 === 0 || num % 3 === 0) return false;
    for (let i = 5; i * i <= num; i += 6) {
      if (num % i === 0 || num % (i + 2) === 0) return false;
    }
    return true;
  }

  function formatEuro(value) {
    return `€ ${value.toFixed(2).replace('.', ',')}`;
  }

  // ------------------------------------------------------------
  // RELÓGIO
  // ------------------------------------------------------------
  function updateClock() {
    const now = new Date();
    document.getElementById('timeLine').textContent = now.toLocaleTimeString('pt-PT');
    document.getElementById('dateLine').textContent = now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ------------------------------------------------------------
  // SIMULAÇÃO DE MONTE CARLO (quentes/frios)
  // ------------------------------------------------------------
  function simulateFrequencies(gameKey) {
    const cfg = RULES[gameKey];
    const numFreq = new Array(cfg.maxN + 1).fill(0);
    const starFreq = new Array(cfg.maxS + 1).fill(0);
    const iterations = 10000;

    for (let d = 0; d < iterations; d++) {
      let drawN = new Set();
      while(drawN.size < cfg.reqN) {
        drawN.add(Math.floor(Math.random() * cfg.maxN) + 1);
      }
      drawN.forEach(n => numFreq[n]++);

      let drawS = new Set();
      while(drawS.size < cfg.reqS) {
        drawS.add(Math.floor(Math.random() * cfg.maxS) + 1);
      }
      drawS.forEach(s => starFreq[s]++);
    }

    let mappedNums = numFreq.map((freq, idx) => ({ num: idx, val: freq })).slice(1);
    mappedNums.sort((a, b) => b.val - a.val);

    hotNumbers = mappedNums.slice(0, 6).map(x => x.num);
    coldNumbers = mappedNums.slice(-6).reverse().map(x => x.num);

    let html = `
      <div class="freq-grid">
        <div class="freq-col">
          <div class="title">🔥 NÚMEROS QUENTES</div>
          <div style="text-align:center;">
            ${hotNumbers.map(n => `<span class="num-item hot">${n}</span>`).join('')}
          </div>
        </div>
        <div class="freq-col">
          <div class="title">❄️ NÚMEROS FRIOS</div>
          <div style="text-align:center;">
            ${coldNumbers.map(n => `<span class="num-item cold">${n}</span>`).join('')}
          </div>
        </div>
      </div>
      <p style="margin-top: 8px; text-align: center; font-size: 0.75rem; color: #8ab;">
        Resultados baseados em simulações estatísticas no espaço amostral do jogo.
      </p>
    `;
    document.getElementById('freqContent').innerHTML = html;
  }

  // ------------------------------------------------------------
  // INTERFACE (UI)
  // ------------------------------------------------------------
  function initUI() {
    const gameKey = document.getElementById('gameSelect').value;
    const cfg = RULES[gameKey];

    document.getElementById('gameInfo').innerHTML = `<b>${cfg.name}:</b> Selecione até ${cfg.limitN} números e ${cfg.limitS} estrelas para apostas múltiplas. O sistema gera apostas simples equivalentes.`;

    const numSelect = document.getElementById('numQty');
    numSelect.innerHTML = "";
    for (let i = cfg.reqN; i <= cfg.limitN; i++) {
      let opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i === cfg.reqN ? `${i} (Simples)` : `${i} Números (Múltipla)`;
      numSelect.appendChild(opt);
    }

    const starSelect = document.getElementById('starQty');
    const starLabel = document.getElementById('labelS');
    starSelect.innerHTML = "";

    if (gameKey === 'euromilhoes') {
      starLabel.textContent = "Estrelas";
      starLabel.style.display = "block";
      starSelect.style.display = "block";
      for (let i = cfg.reqS; i <= cfg.limitS; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i === cfg.reqS ? `${i} (Simples)` : `${i} Estrelas (Múltipla)`;
        starSelect.appendChild(opt);
      }
    } else if (gameKey === 'totoloto') {
      starLabel.textContent = "Número da Sorte";
      starLabel.style.display = "block";
      starSelect.style.display = "block";
      let opt = document.createElement('option');
      opt.value = 1;
      opt.textContent = "1 Nº da Sorte (Fixo)";
      starSelect.appendChild(opt);
    } else if (gameKey === 'eurodreams') {
      starLabel.textContent = "Número de Sonho";
      starLabel.style.display = "block";
      starSelect.style.display = "block";
      for (let i = cfg.reqS; i <= cfg.limitS; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i === cfg.reqS ? `${i} (Simples)` : `${i} Nº de Sonho (Múltipla)`;
        starSelect.appendChild(opt);
      }
    } else {
      starLabel.style.display = "none";
      starSelect.style.display = "none";
    }

    simulateFrequencies(gameKey);
    updateCalc();
    document.getElementById('resultArea').style.display = 'none';
  }

  // ------------------------------------------------------------
  // CÁLCULO DE CUSTO
  // ------------------------------------------------------------
  function updateCalc() {
    const gameKey = document.getElementById('gameSelect').value;
    const cfg = RULES[gameKey];
    const numQty = parseInt(document.getElementById('numQty').value) || cfg.reqN;
    const starQty = parseInt(document.getElementById('starQty').value) || cfg.reqS;
    const betsQty = parseInt(document.getElementById('howMany').value) || 1;

    const combN = combinations(numQty, cfg.reqN);
    const combS = combinations(starQty, cfg.reqS);
    const totalCombinations = combN * combS;
    const totalCost = cfg.base * totalCombinations * betsQty;

    document.getElementById('totalPrice').textContent = formatEuro(totalCost);

    const comboInfo = document.getElementById('comboInfo');
    if (totalCombinations === 1) {
      comboInfo.textContent = `${betsQty} APOSTA(S) SIMPLES PRONTA(S)`;
      comboInfo.style.color = "var(--emerald)";
    } else {
      comboInfo.textContent = `SISTEMA MULTI-COMBINAÇÕES: CONTÉM ${totalCombinations} APOSTAS INTERNAS POR JOGO`;
      comboInfo.style.color = "var(--cyan)";
    }
  }

  // ------------------------------------------------------------
  // AVALIAÇÃO DE COMBINAÇÃO (MOTOR NEXUS V9.0)
  // ------------------------------------------------------------
  function parseExclusions() {
    const text = document.getElementById('excludeInput').value;
    return text.split(/[\s,;]+/).map(n => parseInt(n.trim())).filter(n => !isNaN(n));
  }

  function evaluateCombination(numbers, cfg, useHotCold) {
    const n = numbers.length;
    let score = 50;
    const details = {};

    // 1. Par/Ímpar
    const odds = numbers.filter(x => x % 2 !== 0).length;
    const evens = n - odds;
    const diff = Math.abs(odds - evens);
    const idealDiff = (n % 2 === 0) ? 0 : 1;
    if (diff === idealDiff) {
      score += 20;
      details.parImpar = "Perfeito";
    } else if (diff <= idealDiff + 1) {
      score += 10;
      details.parImpar = "Bom";
    } else if (diff <= idealDiff + 2) {
      score += 0;
      details.parImpar = "Aceitável";
    } else {
      score -= 20;
      details.parImpar = "Ruim";
    }

    // 2. Distribuição por dezenas
    const groups = cfg.decadeGroups;
    let groupCount = 0;
    for (let g of groups) {
      let count = numbers.filter(x => x >= g[0] && x <= g[1]).length;
      if (count > 0) groupCount++;
    }
    const minGroups = (n >= 5) ? 3 : 2;
    if (groupCount >= minGroups) {
      score += 15;
      details.dezenas = `${groupCount} grupos (ótimo)`;
    } else if (groupCount >= minGroups - 1) {
      score += 5;
      details.dezenas = `${groupCount} grupos (aceitável)`;
    } else {
      score -= 20;
      details.dezenas = `${groupCount} grupos (pouco)`;
    }

    // 3. Soma
    const expectedAvg = (1 + cfg.maxN) / 2;
    const targetSum = n * expectedAvg;
    const actualSum = numbers.reduce((a, b) => a + b, 0);
    const variance = (cfg.maxN * cfg.maxN - 1) / 12;
    const stdDev = Math.sqrt(variance * n);
    const sumDiff = Math.abs(actualSum - targetSum);
    if (sumDiff <= stdDev) {
      score += 15;
      details.soma = "Dentro do esperado";
    } else if (sumDiff <= 1.5 * stdDev) {
      score += 5;
      details.soma = "Próximo";
    } else {
      score -= 15;
      details.soma = "Desviado";
    }

    // 4. Sequências consecutivas
    let maxConsec = 1;
    let temp = 1;
    for (let i = 1; i < numbers.length; i++) {
      if (numbers[i] === numbers[i - 1] + 1) {
        temp++;
        if (temp > maxConsec) maxConsec = temp;
      } else {
        temp = 1;
      }
    }
    if (maxConsec <= 2) {
      score += 10;
      details.consec = maxConsec;
    } else if (maxConsec === 3) {
      score += 0;
      details.consec = maxConsec;
    } else {
      score -= 15;
      details.consec = maxConsec;
    }

    // 5. Primos
    const primesCount = numbers.filter(x => isPrime(x)).length;
    const idealPrimes = Math.round(n * 0.3);
    if (Math.abs(primesCount - idealPrimes) <= 1) {
      score += 5;
      details.primos = "Bom";
    } else {
      details.primos = "Neutro";
    }

    // 6. Quentes/Frios
    if (useHotCold && hotNumbers.length && coldNumbers.length) {
      const hasHot = numbers.some(x => hotNumbers.includes(x));
      const hasCold = numbers.some(x => coldNumbers.includes(x));
      if (hasHot && hasCold) {
        score += 5;
        details.hotCold = "Mistura";
      } else if (hasHot || hasCold) {
        score += 2;
        details.hotCold = "Parcial";
      } else {
        details.hotCold = "Nenhum";
      }
    }

    let finalScore = Math.min(100, Math.max(0, 50 + (score - 50) * 1.2));
    if (finalScore > 99) finalScore = 99;

    return {
      score: finalScore,
      details: details,
      oddRatio: `${odds}:${evens}`,
      sum: actualSum,
      primes: primesCount,
      consec: maxConsec
    };
  }

  // ------------------------------------------------------------
  // GERAÇÃO DE COMBINAÇÕES
  // ------------------------------------------------------------
  function generateNumbers() {
    try {
      const gameKey = document.getElementById('gameSelect').value;
      const cfg = RULES[gameKey];
      const numQty = parseInt(document.getElementById('numQty').value);
      const starQty = parseInt(document.getElementById('starQty').value);
      const howMany = parseInt(document.getElementById('howMany').value);
      const exclusions = parseExclusions();
      const useHotCold = document.getElementById('useHotCold').checked;

      const availableNumbers = cfg.maxN - exclusions.filter(x => x >= 1 && x <= cfg.maxN).length;
      if (availableNumbers < numQty) {
        alert(`Impossível gerar: removeu demasiados números. Atualmente só tem ${availableNumbers} números disponíveis, mas necessita de ${numQty}.`);
        return;
      }

      generatedGames = [];
      const resultsList = document.getElementById('resultsList');
      resultsList.innerHTML = "";

      function generateRandomNumbers(count, exclude) {
        let result = [];
        while (result.length < count) {
          let r = Math.floor(Math.random() * cfg.maxN) + 1;
          if (!result.includes(r) && !exclude.includes(r)) {
            result.push(r);
          }
        }
        result.sort((a, b) => a - b);
        return result;
      }

      for (let b = 0; b < howMany; b++) {
        let bestCombination = null;
        let topAnalysis = null;
        let bestScore = -1;

        const maxAttempts = 5000;

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          // Estratégia: par/ímpar balanceado
          let targetOdds = Math.floor(numQty / 2);
          if (numQty % 2 !== 0) {
            targetOdds += Math.random() < 0.5 ? 0 : 1;
          }
          targetOdds = Math.max(1, Math.min(numQty - 1, targetOdds));
          let targetEvens = numQty - targetOdds;

          let evenPool = [];
          let oddPool = [];
          for (let i = 1; i <= cfg.maxN; i++) {
            if (exclusions.includes(i)) continue;
            if (i % 2 === 0) evenPool.push(i);
            else oddPool.push(i);
          }

          const shuffle = (arr) => {
            for (let i = arr.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
          };
          shuffle(evenPool);
          shuffle(oddPool);

          let selected = [];
          if (evenPool.length >= targetEvens && oddPool.length >= targetOdds) {
            selected = selected.concat(evenPool.slice(0, targetEvens));
            selected = selected.concat(oddPool.slice(0, targetOdds));
          } else {
            selected = generateRandomNumbers(numQty, exclusions);
          }
          if (selected.length !== numQty) {
            selected = generateRandomNumbers(numQty, exclusions);
          }
          selected.sort((a, b) => a - b);

          let evalResult = evaluateCombination(selected, cfg, useHotCold);
          if (evalResult.score > bestScore) {
            bestScore = evalResult.score;
            bestCombination = selected.slice();
            topAnalysis = evalResult;
          }
          if (evalResult.score >= 96) break;
        }

        if (!bestCombination) {
          bestCombination = generateRandomNumbers(numQty, exclusions);
          topAnalysis = evaluateCombination(bestCombination, cfg, useHotCold);
        }

        // Estrelas
        let starPool = [];
        for (let s = 1; s <= cfg.maxS; s++) starPool.push(s);
        const shuffle = (arr) => {
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          return arr;
        };
        shuffle(starPool);
        let selectedStars = starPool.slice(0, starQty).sort((a, b) => a - b);

        generatedGames.push({ nums: bestCombination, stars: selectedStars, analysis: topAnalysis });

        // Cálculo de odds locais
        const combN = combinations(numQty, cfg.reqN);
        const combS = combinations(starQty, cfg.reqS);
        const combTotal = combN * combS;
        const localizedOdds = Math.round(cfg.trueOdds / combTotal);

        // Renderizar bloco
        let block = document.createElement('div');
        block.className = 'combo-block';
        let headerLabel = combTotal > 1 ? `Conjunto #${b + 1} (Múltipla: ${numQty}N + ${starQty}S - ${combTotal} Combinadas)` : `Conjunto #${b + 1} (Simples)`;

        const d = topAnalysis.details || {};
        const filtros = `Par/Ímpar: ${d.parImpar || '?'} · Dezenas: ${d.dezenas || '?'} · Soma: ${d.soma || '?'} · Seq: ${d.consec || '?'}${useHotCold ? ` · Hot/Cold: ${d.hotCold || '?'}` : ''}`;

        block.innerHTML = `
          <div class="combo-title">${headerLabel}</div>
          <div class="ball-group">
            ${bestCombination.map(n => `<div class="ball">${n}</div>`).join('')}
            ${selectedStars.map(s => `<div class="ball star">${s}</div>`).join('')}
          </div>
          <div class="draw-schedule">📅 ${cfg.drawInfo}</div>
          <div class="analysis">
            ⚡ <b>Eficiência Analítica: ${topAnalysis.score.toFixed(1)}%</b><br>
            Filtros: ${filtros}
          </div>
          <div class="real-odds">
            ⚠️ Probabilidade de 1.º Prémio (para esta aposta): 1 em ${localizedOdds.toLocaleString('pt-PT')}
          </div>
        `;
        resultsList.appendChild(block);
      }

      document.getElementById('resultArea').style.display = 'block';
      document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
    } catch (err) {
      alert('Ocorreu um erro ao gerar os números. Verifique o console para mais detalhes.');
      console.error(err);
    }
  }

  // ------------------------------------------------------------
  // CÓPIA
  // ------------------------------------------------------------
  function copyCombination() {
    const gameKey = document.getElementById('gameSelect').value.toUpperCase();
    if (generatedGames.length === 0) return;

    let outputText = `⚡ NEXUS ULTRA V9.0 - RESULTADOS ⚡\n`;
    outputText += `========================================\n`;
    outputText += `JOGO: ${gameKey}\n\n`;

    generatedGames.forEach((item, index) => {
      outputText += `CONJUNTO #${index + 1}:\n`;
      outputText += `Números: ${item.nums.join(', ')}\n`;
      outputText += `Estrelas/Suplementares: ${item.stars.join(', ')}\n`;
      outputText += `Eficiência: ${item.analysis.score.toFixed(1)}%\n\n`;
    });

    outputText += `========================================\n`;
    outputText += `Boa sorte! Jogue com responsabilidade.`;

    navigator.clipboard.writeText(outputText).then(() => {
      const copyBtn = document.getElementById('copyBtn');
      copyBtn.textContent = "✅ COPIADO!";
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = "📋 COPIAR RESULTADOS";
        copyBtn.classList.remove('copied');
      }, 3000);
    }).catch(err => {
      console.error('Erro ao copiar: ', err);
    });
  }

  // ------------------------------------------------------------
  // INICIALIZAÇÃO
  // ------------------------------------------------------------
  window.addEventListener('DOMContentLoaded', () => {
    initUI();
  });
</script>
