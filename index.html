<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NEXUS ULTRA V6 · Matemática Avançada</title>
  <style>
    :root {
      --void: #02040a;
      --gold: #ffd700;
      --cyan: #00f2ff;
      --emerald: #00ff88;
      --danger: #ff4d6d;
      --panel: rgba(10, 15, 28, 0.98);
      --font-size-base: 13pt;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      font-size: var(--font-size-base);
    }

    body {
      background: var(--void);
      background-image: radial-gradient(circle at center, #0a1b3a 0%, #02040a 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 580px;
      background: var(--panel);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 25px;
      padding: 26px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      overflow-y: auto;
      max-height: 95dvh;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }
    .header h1 {
      font-size: 2.1rem;
      letter-spacing: 2px;
      color: var(--gold);
      font-weight: 900;
      line-height: 1.1;
    }
    .header p {
      font-size: 0.85rem;
      color: var(--cyan);
      text-transform: uppercase;
      margin-top: 6px;
    }

    .clock-box, .info-box, .freq-box {
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid rgba(0,242,255,0.12);
    }
    .clock-box { text-align: center; }
    #timeLine {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--cyan);
      display: block;
    }
    #dateLine {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--cyan);
      display: block;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }

    .info-box, .freq-box {
      color: #ccd;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .freq-box b { color: var(--gold); }
    .freq-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }
    .freq-col {
      background: rgba(255,255,255,0.02);
      padding: 8px;
      border-radius: 10px;
    }
    .freq-col .title {
      font-weight: 800;
      color: var(--gold);
      text-align: center;
      margin-bottom: 4px;
    }
    .num-item {
      display: inline-block;
      background: #111;
      padding: 2px 10px;
      border-radius: 20px;
      margin: 2px;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .num-item.hot { color: var(--danger); }
    .num-item.cold { color: var(--cyan); }

    label {
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 800;
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    select, textarea {
      width: 100%;
      padding: 14px;
      background: #000;
      border: 1px solid #444;
      color: #fff;
      border-radius: 12px;
      font-weight: bold;
      outline: none;
      margin-bottom: 12px;
    }

    .config-group { margin-bottom: 16px; }

    .exclude-box textarea {
      border-left: 5px solid var(--danger);
      height: 62px;
      resize: none;
    }

    .price-tag {
      background: linear-gradient(135deg, rgba(0,255,136,0.05), rgba(0,242,255,0.05));
      padding: 16px;
      border-radius: 15px;
      text-align: center;
      margin-bottom: 18px;
      border: 1px solid rgba(0,255,136,0.3);
    }
    .price-tag b {
      font-size: 2rem;
      color: #fff;
      display: block;
      margin-bottom: 4px;
    }
    .price-sub {
      font-size: 0.95rem;
      color: var(--emerald);
      font-weight: 800;
    }

    .main-btn, .copy-btn {
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      border: none;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
    }
    .main-btn {
      background: linear-gradient(45deg, #d4af37, #f1c40f);
      color: #000;
    }
    .result-area {
      display: none;
      margin-top: 25px;
      padding-top: 15px;
      border-top: 2px solid rgba(255,215,0,0.2);
    }
    .combo-block {
      background: rgba(255,255,255,0.02);
      padding: 15px;
      border-radius: 20px;
      margin-bottom: 18px;
      border: 1px solid #333;
    }
    .combo-title {
      text-align: center;
      color: var(--gold);
      font-weight: 900;
      margin-bottom: 10px;
    }
    .ball-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 12px 0;
    }
    .ball {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #000;
      border: 3px solid var(--cyan);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #fff;
      font-size: 1.25rem;
    }
    .ball.star {
      border-color: var(--gold);
      color: var(--gold);
    }
    .analysis, .draw-info {
      color: #ddd;
      text-align: center;
      line-height: 1.6;
      padding: 10px;
    }
    .analysis { border-top: 1px solid #333; }
    .analysis b, .draw-info b { color: var(--emerald); }

    .copy-btn {
      border: 2px solid var(--cyan);
      background: transparent;
      color: var(--cyan);
    }
    .copy-btn.copied {
      background: var(--emerald);
      border-color: var(--emerald);
      color: #000;
    }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #445;
      margin-top: 26px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>NEXUS ULTRA</h1>
    <p>Filtragem Avançada · Probabilidade Realista</p>
  </div>

  <div class="clock-box">
    <span id="timeLine">00:00:00</span>
    <span id="dateLine">...</span>
  </div>

  <div class="info-box" id="gameInfo">Escolhe o jogo para ver regras e sorteios.</div>

  <div class="freq-box" id="freqBox">
    <b>📊 Frequência (10.000 simulações)</b><br>
    <div id="freqContent">A simular...</div>
  </div>

  <div class="config-group">
    <label>Jogo</label>
    <select id="gameSelect" onchange="initUI()">
      <option value="euromilhoes">EUROMILHÕES</option>
      <option value="totoloto">TOTOLOTO</option>
      <option value="eurodreams">EURODREAMS</option>
    </select>

    <label>Números</label>
    <select id="numQty" onchange="updateCalc()"></select>

    <label id="labelS">Estrelas</label>
    <select id="starQty" onchange="updateCalc()"></select>

    <label>Nº de apostas</label>
    <select id="howMany" onchange="updateCalc()">
      <option value="1">1 aposta única</option>
      <option value="3">3 apostas múltiplas</option>
      <option value="5">5 apostas múltiplas</option>
    </select>
  </div>

  <div class="config-group exclude-box">
    <label>Números a excluir</label>
    <textarea id="excludeInput" placeholder="Ex: 5, 18, 31" oninput="updateCalc()"></textarea>
  </div>

  <div class="price-tag">
    <b id="totalPrice">€ 0,00</b>
    <div class="price-sub" id="comboInfo">SISTEMA PRONTO</div>
  </div>

  <button class="main-btn" onclick="generateNumbers()">⚡ GERAR JOGOS</button>

  <div class="result-area" id="resultArea">
    <div id="resultsList"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyCombination()">📋 COPIAR JOGOS</button>
    <footer>SISTEMA NEXUS v6.1 · Filtros estatísticos avançados · Divirta-se com responsabilidade</footer>
  </div>
</div>

<script>
  // ------------------------------------------------------------
  // CONFIGURAÇÕES DOS JOGOS
  // ------------------------------------------------------------
  const RULES = {
    euromilhoes: {
      base: 2.5, reqN: 5, reqS: 2, maxN: 50, maxS: 12, limitN: 12, limitS: 12, drawDays: [2, 5],
      info: "Euromilhões: 5 números (1‑50) e 2 estrelas (1‑12). Sorteios: terça e sexta.",
    },
    totoloto: {
      base: 1.0, reqN: 5, reqS: 1, maxN: 49, maxS: 13, limitN: 12, limitS: 1, drawDays: [3, 6],
      info: "Totoloto: 5 números (1‑49) e 1 Número da Sorte (1‑13). Sorteios: quarta e sábado.",
    },
    eurodreams: {
      base: 2.5, reqN: 6, reqS: 1, maxN: 40, maxS: 5, limitN: 12, limitS: 5, drawDays: [1, 4],
      info: "EuroDreams: 6 números (1‑40) e 1 Número de Sonho (1‑5). Sorteios: segunda e quinta.",
    }
  };

  // ------------------------------------------------------------
  // ESTADO GLOBAL
  // ------------------------------------------------------------
  let generatedData = [];
  let freqData = {};
  let lastNumsHist = [];
  let lastStarsHist = [];
  let isSimulating = false;

  // ------------------------------------------------------------
  // FUNÇÕES AUXILIARES
  // ------------------------------------------------------------
  function isPrime(num) {
    if (num <= 1) return false;
    if (num <= 3) return true;
    if (num % 2 === 0 || num % 3 === 0) return false;
    for (let i = 5; i * i <= num; i += 6) {
      if (num % i === 0 || num % (i + 2) === 0) return false;
    }
    return true;
  }

  function isFibonacci(num) {
    if (num < 0) return false;
    let a = 0, b = 1;
    while (b < num) [a, b] = [b, a + b];
    return b === num || num === 0;
  }

  function combinations(n, k) {
    if (k > n) return 0;
    let res = 1;
    for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i;
    return Math.round(res);
  }

  // ------------------------------------------------------------
  // RELÓGIO
  // ------------------------------------------------------------
  function updateClock() {
    const now = new Date();
    document.getElementById('timeLine').textContent = now.toLocaleTimeString('pt-PT');
    document.getElementById('dateLine').textContent = now.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
  setInterval(updateClock, 1000);

  // ------------------------------------------------------------
  // SIMULAÇÃO DE 10.000 SORTEIOS (com os mesmos filtros)
  // ------------------------------------------------------------
  function simulateFrequencies(gameKey, numQty, starQty, draws = 10000) {
    const cfg = RULES[gameKey];
    const numFreq = new Array(cfg.maxN + 1).fill(0);
    const starFreq = new Array(cfg.maxS + 1).fill(0);
    let lastNums = [];
    let lastStars = [];

    for (let d = 0; d < draws; d++) {
      const nums = generateRawNumbers(cfg, numQty, lastNums, []);
      const stars = generateRawStars(cfg, starQty, lastStars, []);
      nums.forEach(n => numFreq[n]++);
      stars.forEach(s => starFreq[s]++);
      lastNums = nums;
      lastStars = stars;
    }
    return { nums: numFreq, stars: starFreq };
  }

  function generateRawNumbers(cfg, qty, lastNums, excluded) {
    const max = cfg.maxN;
    const pool = [];
    for (let i = 1; i <= max; i++) {
      if (!excluded.includes(i)) pool.push(i);
    }
    const avoid = new Set(lastNums || []);
    const filteredPool = pool.filter(n => !avoid.has(n));
    const finalPool = filteredPool.length >= qty ? filteredPool : pool;
    return advancedFilter(finalPool, qty, cfg);
  }

  function generateRawStars(cfg, qty, lastStars, excluded) {
    const max = cfg.maxS;
    const pool = [];
    for (let i = 1; i <= max; i++) {
      if (!excluded.includes(i)) pool.push(i);
    }
    const avoid = new Set(lastStars || []);
    const filteredPool = pool.filter(s => !avoid.has(s));
    const finalPool = filteredPool.length >= qty ? filteredPool : pool;
    const res = [];
    const temp = finalPool.slice();
    for (let i = 0; i < qty; i++) {
      if (temp.length === 0) break;
      const idx = Math.floor(Math.random() * temp.length);
      res.push(temp.splice(idx, 1)[0]);
    }
    return res.sort((a,b)=>a-b);
  }

  // ------------------------------------------------------------
  // FILTRO AVANÇADO (núcleo matemático)
  // ------------------------------------------------------------
  function advancedFilter(pool, count, cfg) {
    const max = cfg.maxN;
    const mid = Math.floor(max / 2);
    const avgSum = (count * (1 + max)) / 2;
    const theoreticalStd = Math.sqrt((count * (max * max - 1)) / 12); // desvio padrão teórico

    for (let attempt = 0; attempt < 25000; attempt++) {
      let nums = [];
      let temp = pool.slice();
      for (let i = 0; i < count; i++) {
        if (temp.length === 0) break;
        const idx = Math.floor(Math.random() * temp.length);
        nums.push(temp.splice(idx, 1)[0]);
      }
      if (nums.length < count) continue;
      nums.sort((a,b)=>a-b);

      const relax = Math.floor(attempt / 1800); // 14 níveis de relaxamento

      // 1. Soma dentro de 1.2 desvios padrão (relaxa até 2.5)
      const sum = nums.reduce((a,b)=>a+b,0);
      const zSum = Math.abs(sum - avgSum) / theoreticalStd;
      if (zSum > 1.2 + relax * 0.1) continue;

      // 2. Desvio padrão amostral próximo do teórico
      const mean = sum / count;
      const variance = nums.reduce((s, n) => s + (n - mean) ** 2, 0) / count;
      const std = Math.sqrt(variance);
      const ratio = std / theoreticalStd;
      if (ratio < 0.4 || ratio > 1.9 + relax * 0.05) continue;

      // 3. Paridade equilibrada
      const evens = nums.filter(n => n % 2 === 0).length;
      if (count === 5 && (evens < 1 || evens > 4)) continue;
      if (count === 6 && (evens < 2 || evens > 4)) continue;

      // 4. Distribuição altos/baixos
      const lows = nums.filter(n => n <= mid).length;
      if (count === 5 && (lows < 1 || lows > 4)) continue;
      if (count === 6 && (lows < 2 || lows > 4)) continue;

      // 5. Consecutivos: máximo 1 par, zero triplas
      let consec = 0;
      let triple = false;
      for (let i = 0; i < nums.length - 1; i++) {
        if (nums[i+1] - nums[i] === 1) consec++;
        if (i < nums.length - 2 && nums[i+1] - nums[i] === 1 && nums[i+2] - nums[i+1] === 1) triple = true;
      }
      if (triple || consec > 1) continue;

      // 6. Primos (1-3 para 5 nums, 2-4 para 6)
      const primes = nums.filter(isPrime).length;
      if (count === 5 && (primes < 1 || primes > 3)) continue;
      if (count === 6 && (primes < 2 || primes > 4)) continue;

      // 7. Terminações (máximo 2 iguais)
      const endings = {};
      nums.forEach(n => { const d = n % 10; endings[d] = (endings[d] || 0) + 1; });
      if (Object.values(endings).some(v => v > 2)) continue;

      // 8. Distribuição por dezenas (máximo 2 por dezena se max>=40)
      const decades = {};
      nums.forEach(n => { const d = Math.floor((n-1)/10); decades[d] = (decades[d] || 0) + 1; });
      if (max >= 40 && Object.values(decades).some(v => v > 2)) continue;
      if (Object.keys(decades).length < 2) continue;

      // 9. Números Fibonacci (máximo 2)
      if (nums.filter(isFibonacci).length > 2) continue;

      // 10. Soma dos dígitos total dentro de 1.5 desvios da média
      const digitSum = nums.reduce((s, n) => s + String(n).split('').reduce((a,b)=>a+parseInt(b),0), 0);
      const avgDigitSum = count * 4.5; // valor médio aproximado
      if (Math.abs(digitSum - avgDigitSum) > count * 2.5) continue;

      // 11. Lacuna média (gap) entre números vizinhos
      const gaps = nums.slice(1).map((n,i) => n - nums[i-1]);
      const avgGap = gaps.reduce((a,b)=>a+b,0) / gaps.length;
      const maxGap = Math.max(...gaps);
      if (avgGap < 2 || avgGap > (max / count) * 1.8 || maxGap > max * 0.6) continue;

      // 12. Números espelho (ex: 12 e 21) – raros, evitamos mais de 1 par
      let mirrorPairs = 0;
      for (let i = 0; i < nums.length; i++) {
        for (let j = i+1; j < nums.length; j++) {
          if (String(nums[i]) === String(nums[j]).split('').reverse().join('')) mirrorPairs++;
        }
      }
      if (mirrorPairs > 1) continue;

      return nums;
    }

    // Fallback: seleção aleatória simples
    const temp = pool.slice();
    const res = [];
    for (let i = 0; i < count; i++) {
      if (temp.length === 0) break;
      const idx = Math.floor(Math.random() * temp.length);
      res.push(temp.splice(idx, 1)[0]);
    }
    return res.sort((a,b)=>a-b);
  }

  // ------------------------------------------------------------
  // INICIALIZAÇÃO DA INTERFACE E FREQUÊNCIAS
  // ------------------------------------------------------------
  function initUI() {
    const g = document.getElementById('gameSelect').value;
    const cfg = RULES[g];
    const nSel = document.getElementById('numQty');
    const sSel = document.getElementById('starQty');

    nSel.innerHTML = "";
    sSel.innerHTML = "";
    for (let i = cfg.reqN; i <= cfg.limitN; i++) nSel.add(new Option(i, i));
    for (let i = cfg.reqS; i <= cfg.limitS; i++) sSel.add(new Option(i, i));

    document.getElementById('labelS').textContent = cfg.reqS > 1 ? "Estrelas" : "Número da Sorte";
    document.getElementById('gameInfo').textContent = cfg.info;

    updateFrequencies(g);
    updateCalc();
  }

  function updateFrequencies(gameKey) {
    const cfg = RULES[gameKey];
    const numQty = cfg.reqN;
    const starQty = cfg.reqS;
    const key = gameKey + '_' + numQty + '_' + starQty;

    if (!freqData[key] && !isSimulating) {
      isSimulating = true;
      document.getElementById('freqContent').innerHTML = '⏳ A simular 10.000 sorteios...';
      setTimeout(() => {
        const data = simulateFrequencies(gameKey, numQty, starQty, 10000);
        freqData[key] = data;
        isSimulating = false;
        displayFrequencies(data);
      }, 50);
    } else if (freqData[key]) {
      displayFrequencies(freqData[key]);
    }
  }

  function displayFrequencies(data) {
    const numFreq = data.nums;
    let entries = [];
    for (let i = 1; i < numFreq.length; i++) {
      entries.push({ num: i, freq: numFreq[i] });
    }
    entries.sort((a,b) => b.freq - a.freq);
    const top5 = entries.slice(0, 5);
    const bottom5 = entries.slice(-5).reverse();

    let html = `<div class="freq-grid">`;
    html += `<div class="freq-col"><div class="title">🔥 Mais sorteados</div>`;
    top5.forEach(e => {
      html += `<span class="num-item hot">${e.num} (${e.freq})</span>`;
    });
    html += `</div>`;
    html += `<div class="freq-col"><div class="title">❄️ Menos sorteados</div>`;
    bottom5.forEach(e => {
      html += `<span class="num-item cold">${e.num} (${e.freq})</span>`;
    });
    html += `</div></div>`;
    document.getElementById('freqContent').innerHTML = html;
  }

  // ------------------------------------------------------------
  // CÁLCULO DE PREÇO
  // ------------------------------------------------------------
  function updateCalc() {
    const g = document.getElementById('gameSelect').value;
    const cfg = RULES[g];
    const n = parseInt(document.getElementById('numQty').value);
    const s = parseInt(document.getElementById('starQty').value);
    const howMany = parseInt(document.getElementById('howMany').value);

    const total = combinations(n, cfg.reqN) * combinations(s, cfg.reqS);
    const price = total * cfg.base * howMany;

    document.getElementById('totalPrice').textContent = `€ ${price.toFixed(2).replace('.', ',')}`;
    document.getElementById('comboInfo').textContent = `${total} combinações simples por aposta · ${howMany} apostas`;
    document.getElementById('resultArea').style.display = 'none';
  }

  // ------------------------------------------------------------
  // GERAÇÃO PONDERADA POR FREQUÊNCIA (INVERSA) + FILTROS
  // ------------------------------------------------------------
  function getWeightedNumbers(cfg, qty, excluded, freqData, lastNums) {
    const max = cfg.maxN;
    let pool = [];
    for (let i = 1; i <= max; i++) {
      if (!excluded.includes(i)) pool.push(i);
    }

    const avoid = new Set(lastNums || []);
    const filteredPool = pool.filter(n => !avoid.has(n));
    const finalPool = filteredPool.length >= qty ? filteredPool : pool;

    // Pesos inversamente proporcionais à frequência (regressão à média)
    const weights = finalPool.map(n => 1 / ((freqData.nums[n] || 0) + 1));
    const totalWeight = weights.reduce((a,b)=>a+b, 0);
    const normWeights = weights.map(w => w / totalWeight);

    let selected = [];
    let available = finalPool.slice();
    let availW = normWeights.slice();

    for (let i = 0; i < qty; i++) {
      if (available.length === 0) break;
      let sum = availW.reduce((a,b)=>a+b, 0);
      let r = Math.random() * sum;
      let idx = 0;
      for (let j = 0; j < availW.length; j++) {
        r -= availW[j];
        if (r <= 0) { idx = j; break; }
      }
      selected.push(available[idx]);
      available.splice(idx, 1);
      availW.splice(idx, 1);
    }
    return advancedFilter(finalPool, qty, cfg);
  }

  function getWeightedStars(cfg, qty, excluded, freqData, lastStars) {
    const max = cfg.maxS;
    let pool = [];
    for (let i = 1; i <= max; i++) {
      if (!excluded.includes(i)) pool.push(i);
    }
    const avoid = new Set(lastStars || []);
    const filteredPool = pool.filter(s => !avoid.has(s));
    const finalPool = filteredPool.length >= qty ? filteredPool : pool;

    const weights = finalPool.map(s => 1 / ((freqData.stars[s] || 0) + 1));
    const total = weights.reduce((a,b)=>a+b, 0);
    const norm = weights.map(w => w / total);

    let selected = [];
    let available = finalPool.slice();
    let availW = norm.slice();
    for (let i = 0; i < qty; i++) {
      if (available.length === 0) break;
      let sum = availW.reduce((a,b)=>a+b, 0);
      let r = Math.random() * sum;
      let idx = 0;
      for (let j = 0; j < availW.length; j++) {
        r -= availW[j];
        if (r <= 0) { idx = j; break; }
      }
      selected.push(available[idx]);
      available.splice(idx, 1);
      availW.splice(idx, 1);
    }
    return selected.sort((a,b)=>a-b);
  }

  // ------------------------------------------------------------
  // GERAR JOGOS (PRINCIPAL)
  // ------------------------------------------------------------
  function generateNumbers() {
    const g = document.getElementById('gameSelect').value;
    const cfg = RULES[g];
    const qtyN = parseInt(document.getElementById('numQty').value);
    const qtyS = parseInt(document.getElementById('starQty').value);
    const howMany = parseInt(document.getElementById('howMany').value);
    const excluded = document.getElementById('excludeInput').value.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n));

    const key = g + '_' + cfg.reqN + '_' + cfg.reqS;
    if (!freqData[key]) {
      alert('A simulação de frequências ainda não terminou. Aguarde...');
      return;
    }
    const freq = freqData[key];

    generatedData = [];
    let html = "";
    const nextDraw = nextDrawText(cfg.drawDays);

    let lastNums = lastNumsHist.length ? lastNumsHist.slice(-2) : [];
    let lastStars = lastStarsHist.length ? lastStarsHist.slice(-2) : [];

    for (let i = 0; i < howMany; i++) {
      const nums = getWeightedNumbers(cfg, qtyN, excluded, freq, lastNums);
      const stars = getWeightedStars(cfg, qtyS, excluded, freq, lastStars);

      generatedData.push({ nums, stars });

      lastNums.push(nums);
      lastStars.push(stars);
      if (lastNums.length > 2) lastNums.shift();
      if (lastStars.length > 2) lastStars.shift();

      const score = calculateMatchScore(nums, cfg.maxN);
      html += `
        <div class="combo-block">
          <div class="combo-title">Aposta ${i + 1}</div>
          <div class="ball-group">${nums.map(v => `<div class="ball">${v}</div>`).join('')}</div>
          <div class="ball-group">${stars.map(v => `<div class="ball star">${v}</div>`).join('')}</div>
          <div class="analysis">
            Soma: <b>${nums.reduce((a,b)=>a+b,0)}</b> |
            Pares: <b>${nums.filter(n=>n%2===0).length}</b> |
            Ímpares: <b>${nums.filter(n=>n%2!==0).length}</b>
            <br/>
            Índice de Viabilidade Real: <b style="color: var(--emerald);">${score}%</b>
          </div>
          <div class="draw-info">${nextDraw}</div>
        </div>
      `;
    }

    lastNumsHist = lastNums;
    lastStarsHist = lastStars;

    document.getElementById('resultsList').innerHTML = html;
    document.getElementById('resultArea').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  // ------------------------------------------------------------
  // AVALIAÇÃO DE VIABILIDADE (MAIS REALISTA)
  // ------------------------------------------------------------
  function calculateMatchScore(nums, max) {
    const count = nums.length;
    const avgSum = (count * (1 + max)) / 2;
    const theoreticalStd = Math.sqrt((count * (max * max - 1)) / 12);
    const sum = nums.reduce((a,b)=>a+b,0);
    const mean = sum / count;
    const variance = nums.reduce((s, n) => s + (n - mean) ** 2, 0) / count;
    const std = Math.sqrt(variance);
    const zSum = Math.abs(sum - avgSum) / theoreticalStd;
    const ratioStd = std / theoreticalStd;
    const evens = nums.filter(n => n % 2 === 0).length;
    const primes = nums.filter(isPrime).length;
    const endings = new Set(nums.map(n => n % 10)).size;
    const decades = new Set(nums.map(n => Math.floor((n-1)/10))).size;
    const gaps = nums.slice(1).map((n,i) => n - nums[i-1]);
    const avgGap = gaps.reduce((a,b)=>a+b,0) / gaps.length;
    const fibCount = nums.filter(isFibonacci).length;

    let score = 100;

    score -= zSum * 6;               // penaliza soma atípica
    score -= Math.abs(1 - ratioStd) * 12; // penaliza dispersão anormal
    if (count === 5) {
      if (evens < 1 || evens > 4) score -= 8;
    } else {
      if (evens < 2 || evens > 4) score -= 8;
    }
    if (primes < 1 || primes > 3) score -= 6;
    if (endings < count - 1) score -= 4;
    if (decades < 3) score -= 5;
    if (avgGap < 2 || avgGap > max / count * 1.5) score -= 5;
    if (fibCount > 2) score -= 3;
    if (new Set(nums).size < count) score -= 20; // duplicatas (não deve acontecer)

    return Math.min(99.9, Math.max(60.0, score)).toFixed(1);
  }

  // ------------------------------------------------------------
  // PRÓXIMO SORTEIO
  // ------------------------------------------------------------
  function nextDrawText(days) {
    const now = new Date();
    for (let i = 0; i < 8; i++) {
      let c = new Date();
      c.setDate(now.getDate() + i);
      if (days.includes(c.getDay())) {
        return "PRÓXIMO SORTEIO: " + c.toLocaleDateString('pt-PT', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
      }
    }
    return "";
  }

  // ------------------------------------------------------------
  // COPIAR
  // ------------------------------------------------------------
  function copyCombination() {
    if (generatedData.length === 0) return;
    const text = generatedData.map((d, i) => `Aposta ${i+1}: ${d.nums.join('-')} | [${d.stars.join('-')}]`).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '✓ COPIADO COM SUCESSO';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.textContent = '📋 COPIAR JOGOS';
      }, 2000);
    });
  }

  // ------------------------------------------------------------
  // INICIALIZAÇÃO
  // ------------------------------------------------------------
  window.onload = () => {
    initUI();
    updateClock();
  };
</script>
