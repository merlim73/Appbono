<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINGULARITY v5.0 · SCML Multi-Compute</title>
    <style>
        :root {
            --void: #02040a;
            --panel: rgba(10, 15, 25, 0.95);
            --gold: #ffcc00;
            --cyan: #00f5ff;
            --emerald: #00ff9d;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background: var(--void);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px 10px;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--panel);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            box-shadow: 0 0 100px rgba(0,0,0,1);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 1.8rem; 
            letter-spacing: 5px; 
            background: linear-gradient(to right, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        /* Painel de Seleção */
        .config-box {
            background: var(--glass);
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        label { display: block; font-size: 0.7rem; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        select {
            width: 100%;
            padding: 18px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 15px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            outline: none;
            cursor: pointer;
        }

        .multi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Mostrador de Preço */
        .price-tag {
            text-align: center;
            padding: 25px;
            background: rgba(0, 255, 157, 0.05);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 2px dashed var(--emerald);
        }

        .price-tag span { display: block; font-size: 0.8rem; color: var(--emerald); }
        .price-tag b { font-size: 2.5rem; color: #fff; text-shadow: 0 0 20px rgba(0,255,157,0.4); }

        .main-btn {
            width: 100%;
            padding: 25px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--gold), #ff8800);
            color: #000;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.3);
        }

        .main-btn:active { transform: scale(0.96); }

        /* RESULTADOS GIGANTES */
        .result-area {
            display: none;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #333;
            animation: fadeIn 0.8s ease;
        }

        .ball-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .ball {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #333, #000);
            border: 3px solid #555;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .ball.star {
            background: radial-gradient(circle at 30% 30%, #5c4b00, #000);
            border-color: var(--gold);
            color: var(--gold);
        }

        .ball.dream {
            background: radial-gradient(circle at 30% 30%, #004d4d, #000);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .terminal {
            font-size: 0.7rem;
            color: var(--emerald);
            background: #000;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            height: 60px;
            overflow: hidden;
            border-left: 3px solid var(--emerald);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Singularity v5.0</h1>
        <p style="font-size: 0.6rem; color: var(--cyan); letter-spacing: 2px;">QUANTUM COMPUTING · SCML EDITION</p>
    </div>

    <div class="config-box">
        <label>Escolha o Jogo</label>
        <select id="gameSelect" onchange="initInterface()">
            <option value="euromilhoes">EURO MILHÕES</option>
            <option value="totoloto">TOTOLOTO</option>
            <option value="eurodreams">EURO DREAMS</option>
        </select>

        <div class="multi-grid">
            <div>
                <label id="labelN">Números</label>
                <select id="numQty" onchange="calculatePrice()"></select>
            </div>
            <div>
                <label id="labelS">Estrelas</label>
                <select id="starQty" onchange="calculatePrice()"></select>
            </div>
        </div>
    </div>

    <div class="price-tag">
        <span>VALOR DO INVESTIMENTO</span>
        <b id="priceDisplay">€ 0,00</b>
    </div>

    <button class="main-btn" onclick="generateQuantum()">Gerar Singularidade</button>

    <div id="term" class="terminal">> Aguardando parâmetros de entrada...</div>

    <div class="result-area" id="result">
        <label style="text-align: center; margin-bottom: 15px;">Números Prognosticados</label>
        <div class="ball-group" id="mainBalls"></div>
        
        <label id="resultLabelS" style="text-align: center; margin-bottom: 15px;">Estrelas</label>
        <div class="ball-group" id="starBalls"></div>
        
        <p style="text-align: center; font-size: 0.7rem; color: #666; margin-top: 20px;">
            Estes números representam a maior probabilidade de convergência dentro do ciclo atual.
        </p>
    </div>
</div>

<script>
    const GAMES = {
        euromilhoes: {
            name: "EuroMilhões", price: 2.5,
            minN: 5, maxN: 10, reqN: 5,
            minS: 2, maxS: 12, reqS: 2,
            sName: "Estrelas", css: "star"
        },
        totoloto: {
            name: "Totoloto", price: 1.0,
            minN: 5, maxN: 11, reqN: 5,
            minS: 1, maxS: 1, reqS: 1,
            sName: "Número da Sorte", css: "star"
        },
        eurodreams: {
            name: "EuroDreams", price: 2.5,
            minN: 6, maxN: 10, reqN: 6,
            minS: 1, maxS: 1, reqS: 1,
            sName: "Número Sonho", css: "dream"
        }
    };

    function combinations(n, k) {
        if (k > n) return 0;
        if (k === 0 || n === k) return 1;
        if (k > n / 2) k = n - k;
        let res = 1;
        for (let i = 1; i <= k; i++) {
            res = res * (n - i + 1) / i;
        }
        return Math.round(res);
    }

    function initInterface() {
        const game = GAMES[document.getElementById('gameSelect').value];
        const nSelect = document.getElementById('numQty');
        const sSelect = document.getElementById('starQty');
        
        document.getElementById('labelS').textContent = game.sName;
        
        nSelect.innerHTML = '';
        for(let i=game.minN; i<=game.maxN; i++) nSelect.add(new Option(i, i));
        
        sSelect.innerHTML = '';
        for(let i=game.minS; i<=game.maxS; i++) sSelect.add(new Option(i, i));

        calculatePrice();
    }

    function calculatePrice() {
        const gameKey = document.getElementById('gameSelect').value;
        const game = GAMES[gameKey];
        const n = parseInt(document.getElementById('numQty').value);
        const s = parseInt(document.getElementById('starQty').value);

        let combos = combinations(n, game.reqN) * combinations(s, game.reqS);
        let total = combos * game.price;

        document.getElementById('priceDisplay').textContent = `€ ${total.toLocaleString('pt-PT', {minimumFractionDigits: 2})}`;
    }

    async function generateQuantum() {
        const resultDiv = document.getElementById('result');
        const term = document.getElementById('term');
        const gameKey = document.getElementById('gameSelect').value;
        const game = GAMES[gameKey];
        
        resultDiv.style.display = 'none';
        term.innerHTML = "> A iniciar motor de busca quântica...";

        // Simulação de "Cálculo Pesado"
        await new Promise(r => setTimeout(r, 800));
        term.innerHTML = "> Analisando múltiplas de Santa Casa...";
        await new Promise(r => setTimeout(r, 800));
        term.innerHTML = "> Singularidade atingida. Extraindo vetores...";
        await new Promise(r => setTimeout(r, 500));

        const nQty = parseInt(document.getElementById('numQty').value);
        const sQty = parseInt(document.getElementById('starQty').value);

        // Limites de sorteio reais
        const maxRangeN = (gameKey === 'euromilhoes') ? 50 : (gameKey === 'totoloto' ? 49 : 40);
        const maxRangeS = (gameKey === 'euromilhoes') ? 12 : (gameKey === 'totoloto' ? 13 : 5);

        const nums = generateSet(nQty, maxRangeN);
        const stars = generateSet(sQty, maxRangeS);

        displayBalls('mainBalls', nums, '');
        displayBalls('starBalls', stars, game.css);
        
        document.getElementById('resultLabelS').textContent = game.sName;
        resultDiv.style.display = 'block';
        term.innerHTML = "> PROGNÓSTICO COMPLETO.";
    }

    function generateSet(count, max) {
        let set = new Set();
        while(set.size < count) {
            set.add(Math.floor(Math.random() * max) + 1);
        }
        return Array.from(set).sort((a,b) => a - b);
    }

    function displayBalls(id, array, extraClass) {
        const container = document.getElementById(id);
        container.innerHTML = '';
        array.forEach(val => {
            const b = document.createElement('div');
            b.className = `ball ${extraClass}`;
            b.textContent = val;
            container.appendChild(b);
        });
    }

    // Iniciar no load
    window.onload = initInterface;
</script>

</body>
</html>
